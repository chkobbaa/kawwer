services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kawwer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - kawwer

  api:
    build: .
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=kawwer;Username=postgres;Password=${POSTGRES_PASSWORD}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Firebase__ServiceAccountJsonPath: /secrets/firebase-service-account.json
      Database__AutoMigrate: "true"
    volumes:
      - ./secrets/firebase-service-account.json:/secrets/firebase-service-account.json:ro
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - kawwer

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - kawwer

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  kawwer:
