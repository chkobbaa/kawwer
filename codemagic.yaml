workflows:

  # ─────────────────────────────────────────────
  # iOS – unsigned .ipa for AltServer sideloading
  # ─────────────────────────────────────────────
  ios-release:
    name: Kawwer iOS (unsigned – AltServer)
    max_build_duration: 90
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: kawwer-ios-build
          include: true
        - pattern: main
          include: true

    environment:
      vars:
        DOTNET_CLI_TELEMETRY_OPTOUT: "1"
        DOTNET_NOLOGO: "1"
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install .NET 10 SDK
        script: |
          set -e
          curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --version 10.0.109

      - name: Install MAUI iOS workload
        script: |
          set -e
          export PATH="$HOME/.dotnet:$HOME/.dotnet/tools:$PATH"
          dotnet workload install maui-ios --skip-sign-check

      - name: Restore packages
        script: |
          export PATH="$HOME/.dotnet:$HOME/.dotnet/tools:$PATH"
          dotnet restore Kawwer.Mobile/Kawwer.Mobile.csproj \
            -p:TargetFrameworks=net10.0-ios \
            -r ios-arm64

      - name: Build unsigned .ipa
        script: |
          export PATH="$HOME/.dotnet:$HOME/.dotnet/tools:$PATH"
          dotnet publish Kawwer.Mobile/Kawwer.Mobile.csproj \
            -f net10.0-ios \
            -c Release \
            --no-restore \
            -p:TargetFrameworks=net10.0-ios \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:_XcodeVersionCheckEnabled=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:CodesignRequireProvisioningProfile=false

    artifacts:
      - "**/*.ipa"
      - "**/*.app"


  # ─────────────────────────────────────────────
  # Android – .apk
  # ─────────────────────────────────────────────
  android-release:
    name: Kawwer Android Release
    max_build_duration: 90
    instance_type: linux_x2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: kawwer-ios-build
          include: true
        - pattern: main
          include: true

    environment:
      android_signing:
        - kawwer_keystore
      vars:
        DOTNET_CLI_TELEMETRY_OPTOUT: "1"
        DOTNET_NOLOGO: "1"

    scripts:
      - name: Install .NET 10 SDK
        script: |
          set -e
          curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --version 10.0.109

      - name: Install MAUI Android workload
        script: |
          set -e
          export PATH="$HOME/.dotnet:$HOME/.dotnet/tools:$PATH"
          dotnet workload install maui-android

      - name: Restore packages
        script: |
          export PATH="$HOME/.dotnet:$HOME/.dotnet/tools:$PATH"
          dotnet restore Kawwer.Mobile/Kawwer.Mobile.csproj \
            -p:TargetFrameworks=net10.0-android

      - name: Build .apk
        script: |
          export PATH="$HOME/.dotnet:$HOME/.dotnet/tools:$PATH"
          dotnet publish Kawwer.Mobile/Kawwer.Mobile.csproj \
            -f net10.0-android \
            -c Release \
            --no-restore \
            -p:TargetFrameworks=net10.0-android \
            -p:AndroidSigningKeyStore=$CM_KEYSTORE_PATH \
            -p:AndroidSigningKeyAlias=$CM_KEY_ALIAS \
            -p:AndroidSigningKeyPass=$CM_KEY_PASSWORD \
            -p:AndroidSigningStorePass=$CM_KEYSTORE_PASSWORD

    artifacts:
      - "**/*.apk"
      - "**/*.aab"
