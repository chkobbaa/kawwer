<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
    #map { position: absolute; inset: 0; }
    #topbar {
        position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000;
        display: flex; gap: 8px;
    }
    #q {
        flex: 1; height: 44px; border: none; border-radius: 12px; padding: 0 14px;
        font-size: 15px; box-shadow: 0 2px 10px rgba(0,0,0,.25); outline: none;
    }
    #searchBtn {
        width: 48px; height: 44px; border: none; border-radius: 12px;
        background: #12211a; color: #c8f542; font-size: 18px; font-weight: bold;
        box-shadow: 0 2px 10px rgba(0,0,0,.25);
    }
    #results {
        position: absolute; top: 60px; left: 10px; right: 10px; z-index: 1000;
        background: #fff; border-radius: 12px; overflow: hidden;
        box-shadow: 0 4px 16px rgba(0,0,0,.3); display: none; max-height: 45%; overflow-y: auto;
    }
    .result { padding: 12px 14px; border-bottom: 1px solid #eee; font-size: 14px; }
    .result b { display: block; }
    .result span { color: #777; font-size: 12px; }
    #hint {
        position: absolute; bottom: 92px; left: 50%; transform: translateX(-50%); z-index: 1000;
        background: rgba(18,33,26,.85); color: #fff; font-size: 12px;
        padding: 8px 14px; border-radius: 20px; white-space: nowrap;
    }
    #confirmBar {
        position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
        background: #fff; padding: 12px 16px 20px; border-radius: 20px 20px 0 0;
        box-shadow: 0 -4px 16px rgba(0,0,0,.25); display: none;
    }
    #selName { font-weight: bold; font-size: 15px; margin-bottom: 2px; }
    #selAddress { color: #777; font-size: 12px; margin-bottom: 10px; }
    #confirmBtn {
        width: 100%; height: 48px; border: none; border-radius: 14px;
        background: #12211a; color: #c8f542; font-size: 16px; font-weight: bold;
    }
</style>
</head>
<body>
<div id="map"></div>
<div id="topbar">
    <input id="q" type="text" placeholder="Search for a place" />
    <button id="searchBtn" onclick="doSearch()">&#128269;</button>
</div>
<div id="results"></div>
<div id="hint">Tap a place to select it &#183; hold 1s for an exact spot</div>
<div id="confirmBar">
    <div id="selName"></div>
    <div id="selAddress"></div>
    <button id="confirmBtn" onclick="confirmSelection()">Confirm location</button>
</div>
<script>
    // Default view: Tunisia. Replaced by the device location when available (see C#).
    var map = L.map('map', { zoomControl: false }).setView([36.8065, 10.1815], 13);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var marker = null;
    var selection = null;

    function setSelection(lat, lng, name, address) {
        selection = { lat: lat, lng: lng, name: name || '', address: address || '' };
        if (marker) { map.removeLayer(marker); }
        marker = L.marker([lat, lng]).addTo(map);
        document.getElementById('selName').textContent =
            selection.name || (lat.toFixed(5) + ', ' + lng.toFixed(5));
        document.getElementById('selAddress').textContent = selection.address;
        document.getElementById('confirmBar').style.display = 'block';
        document.getElementById('hint').style.display = 'none';
    }

    // ---- Search (Nominatim, no API key required) ----
    async function doSearch() {
        var q = document.getElementById('q').value.trim();
        if (!q) { return; }
        var box = document.getElementById('results');
        box.innerHTML = '<div class="result">Searching\u2026</div>';
        box.style.display = 'block';
        try {
            var r = await fetch('https://nominatim.openstreetmap.org/search?format=jsonv2&limit=6&q=' + encodeURIComponent(q));
            var items = await r.json();
            box.innerHTML = '';
            if (!items.length) {
                box.innerHTML = '<div class="result">No results. You can hold on the map for 1s to pick an exact spot.</div>';
                return;
            }
            items.forEach(function (it) {
                var div = document.createElement('div');
                div.className = 'result';
                div.innerHTML = '<b>' + (it.name || it.display_name.split(',')[0]) + '</b><span>' + it.display_name + '</span>';
                div.onclick = function () {
                    box.style.display = 'none';
                    var lat = parseFloat(it.lat), lng = parseFloat(it.lon);
                    map.setView([lat, lng], 17);
                    setSelection(lat, lng, it.name || it.display_name.split(',')[0], it.display_name);
                };
                box.appendChild(div);
            });
        } catch (e) {
            box.innerHTML = '<div class="result">Search failed. Check your connection.</div>';
        }
    }
    document.getElementById('q').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { this.blur(); doSearch(); }
    });

    // ---- Tap: snap to the nearest indexed place ----
    map.on('click', async function (e) {
        document.getElementById('results').style.display = 'none';
        try {
            var r = await fetch('https://nominatim.openstreetmap.org/reverse?format=jsonv2&zoom=18&lat=' + e.latlng.lat + '&lon=' + e.latlng.lng);
            var d = await r.json();
            if (d && d.lat && d.lon) {
                setSelection(parseFloat(d.lat), parseFloat(d.lon), d.name || '', d.display_name || '');
                return;
            }
        } catch (err) { /* fall through to the raw point */ }
        setSelection(e.latlng.lat, e.latlng.lng, '', '');
    });

    // ---- Long-press (~1s): exact location, no snapping ----
    var holdTimer = null;
    var holdPoint = null;
    map.on('mousedown touchstart', function (e) {
        holdPoint = e.latlng;
        holdTimer = setTimeout(function () {
            holdTimer = null;
            setSelection(holdPoint.lat, holdPoint.lng, '', '');
        }, 1000);
    });
    function cancelHold() { if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; } }
    map.on('mouseup touchend move zoomstart dragstart', cancelHold);

    // Fallback: Leaflet also raises 'contextmenu' on a touch long-press.
    map.on('contextmenu', function (e) {
        cancelHold();
        setSelection(e.latlng.lat, e.latlng.lng, '', '');
    });

    function confirmSelection() {
        if (!selection) { return; }
        // Handed back to the app through a custom scheme intercepted by the WebView.
        window.location.href = 'kawwer://confirm'
            + '?lat=' + selection.lat
            + '&lng=' + selection.lng
            + '&name=' + encodeURIComponent(selection.name)
            + '&address=' + encodeURIComponent(selection.address);
    }

    // Called from C# to center on the device position.
    function centerOn(lat, lng) { map.setView([lat, lng], 15); }
</script>
</body>
</html>
